apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strava-stat-api
spec:
  project: default
  source:
    repoURL: https://github.com/linogaliana/strava-stat-gitops.git
    targetRevision: main
    path: api
  destination:
    server: https://kubernetes.default.svc
    namespace: user-lgaliana
  syncPolicy:
    automated:
      selfHeal: true